server:
  port: ${SERVER_PORT:8100}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    database: POSTGRESQL
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
    validate-on-migrate: true

  mongodb:
    uri: ${MONGO_URI}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      connect-timeout: 2000
      timeout: 3000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 2000
        shutdown-timeout: 200

  kafka:
    admin:
      auto-create: false  # 프로덕션에서는 토픽 자동 생성 비활성화
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
      group-id: shoot-prod
      auto-offset-reset: latest
      enable-auto-commit: false
      fetch-min-bytes: 1
      fetch-max-wait: 10
      max-poll-records: 100
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
      acks: all
      compression-type: lz4
      batch-size: 16384
      linger-ms: 10
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    topics:
      chat-messages:
        partitions: 10
        replicas: 3
      chat-notifications:
        partitions: 10
        replicas: 3
      chat-events:
        partitions: 10
        replicas: 3
      dead-letter-topic:
        partitions: 3
        replicas: 3
        retention-ms: 2592000000  # 30일

logging:
  level:
    root: WARN
    com.stark.shoot: INFO
    org.springframework.data.mongodb: WARN
    org.springframework.messaging: WARN
    org.springframework.web: WARN
    org.springframework.kafka: WARN
    org.apache.kafka.clients.consumer.ConsumerConfig: ERROR
    org.apache.kafka.clients.producer.ProducerConfig: ERROR
