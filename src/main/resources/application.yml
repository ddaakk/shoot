spring:
  profiles:
    active: local

  # JPA 공통 설정
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        highlight_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # 파일 업로드 설정
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Redis Lock 설정
redis:
  lock:
    lock-timeout: 10000
    lock-wait-timeout: 2000
    max-retries: 3

# 알림 설정
notification:
  transport: redis

# Slack 알림 설정
slack:
  notification:
    enabled: false
    webhook-url: "${SLACK_WEBHOOK_URL:}"
    channel: "#alerts"
    username: "Shoot Alert Bot"

# CDC 설정
cdc:
  kafka-connect:
    url: http://localhost:8083
  connector:
    name: shoot-outbox-connector
  replication-slot:
    name: shoot_outbox_slot
    lag-threshold-mb: 10

# JWT 설정
jwt:
  secret: "${JWT_SECRET:your-256-bit-secret-key-base64-encoded}"
  expiration: 60
  issuer: "shoot-app"
  audience: "shoot-clients"
  refresh-token:
    expiration: 43200

# 도메인 규칙 설정
app:
  domain:
    chat-room:
      max-participants: 100
      min-group-participants: 2
      max-pinned-messages: 5
    message:
      max-content-length: 4000
      max-attachment-size: 52428800
      batch-size: 100
    friend:
      max-friend-count: 1000
      recommendation-limit: 20

# SpringDoc OpenAPI 설정
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    groups-order: ASC
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
    filter: true
    syntax-highlight:
      activated: true
      theme: monokai
    default-models-expand-depth: 1
    default-model-expand-depth: 1
    doc-expansion: none
    persist-authorization: true
    supported-submit-methods: ["get", "post", "put", "delete", "patch"]
  model:
    tags-sorter: alpha
  paths-to-match:
    - /api/**
  packages-to-scan:
    - com.stark.shoot.adapter.in.rest
    - com.stark.shoot.adapter.in.socket
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  override-with-generic-response: false
  show-actuator: false
